services:
  api:
    build: .
    container_name: book_distribution_app
    ports:
      - "8080:8080"
    environment:
      - TZ=Asia/Muscat
      # JWT signing key (min 32 chars) — REQUIRED: must be set via .env or shell
      # Generate: openssl rand -base64 48
      - Auth__JwtSigningKey=${JWT_SIGNING_KEY:?JWT_SIGNING_KEY is required. Create a .env file with JWT_SIGNING_KEY=$(openssl rand -base64 48)}
      # SQLite connection string (uses persistent volume)
      - ConnectionStrings__DefaultConnection=Data Source=/app/data/app.db;Cache=Shared;Pooling=True
    volumes:
      - book-data:/app/data
      - book-backups:/app/backups
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/settings"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  book-data:
  book-backups:
