<div class="min-h-screen w-full flex items-center justify-center bg-background p-4 relative overflow-hidden">
  
  <!-- Decorative Background Elements -->
  <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-primary/10 blur-3xl pointer-events-none"></div>
  <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] rounded-full bg-secondary/10 blur-3xl pointer-events-none"></div>

  <div class="w-full max-w-md bg-surface-primary rounded-2xl shadow-xl border border-surface-container-high p-8 relative z-10 animate-in fade-in zoom-in-95 duration-500">
    
    <!-- Logo / Brand -->
    <div class="text-center mb-8">
      <img [src]="assetUrls.logo" alt="شعار النظام" class="h-20 w-auto object-contain mx-auto mb-4">
      <h1 class="text-2xl font-bold text-text-heading">{{ settingsService.printSettings().brandName }}</h1>
      <p class="text-on-surface-variant text-sm mt-2">مرحباً بك مجدداً! يرجى تسجيل الدخول للمتابعة</p>
    </div>

    <form (submit)="onSubmit(); $event.preventDefault();" class="space-y-6">
      <!-- Username Field -->
      <div>
        <label class="block text-sm font-medium text-text-heading mb-2">اسم المستخدم</label>
        <div class="relative">
          <span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant">person</span>
          <input type="text" [(ngModel)]="username" name="username" required
                 class="w-full pl-3 pr-10 py-3 bg-surface-container-lowest border border-surface-container-highest rounded-xl text-text-heading focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all placeholder:text-on-surface-variant/50"
                 placeholder="أدخل اسم المستخدم">
        </div>
      </div>

      <!-- Password Field -->
      <div>
        <label class="block text-sm font-medium text-text-heading mb-2">كلمة المرور</label>
        <div class="relative">
          <span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant">lock</span>
          <input type="password" [(ngModel)]="password" name="password" required
                 class="w-full pl-3 pr-10 py-3 bg-surface-container-lowest border border-surface-container-highest rounded-xl text-text-heading focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all placeholder:text-on-surface-variant/50"
                 placeholder="أدخل كلمة المرور">
        </div>
      </div>

      <!-- Submit Button -->
      <button type="submit" [disabled]="!username || !password"
              class="w-full bg-primary text-on-primary font-bold py-3 px-4 rounded-xl hover:bg-primary/90 focus:ring-4 focus:ring-primary/20 transition-all disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2 group">
        تسجيل الدخول
        <span class="material-symbols-outlined text-[20px] group-hover:-translate-x-1 transition-transform">arrow_left_alt</span>
      </button>
    </form>
    
  </div>
</div>
